<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente | Elim Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #d4e117;       
            --secondary: #009ce0;     
            --accent: #005da3;        
            --bg-dark: #162a44;       
            --bg-deep: #0d1a2b;       
            --card-bg: rgba(22, 42, 68, 0.85);
            --input-bg: rgba(0, 0, 0, 0.2);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ocean-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-deep) 100%);
        }

        .blob {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212, 225, 23, 0.07) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) rotate(0deg); }
            to { transform: translate(30%, 20%) rotate(360deg); }
        }

        .prof-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
        }

        .prof-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 25px; right: 30px;
            background: rgba(212, 225, 23, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        
        .icon-box {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 20px;
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            color: var(--bg-deep);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h2 { font-weight: 800; font-size: 1.75rem; color: #fff; }
        .subtitle { color: var(--secondary); font-weight: 600; font-size: 0.9rem; margin-top: 5px; }

        .input-group { margin-bottom: 24px; position: relative; }

        .input-group i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(212, 225, 23, 0.1);
        }

        .btn-glow {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glow:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(0, 156, 224, 0.3);
        }

        .btn-glow:disabled { opacity: 0.6; cursor: not-allowed; }

        .link-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            transition: 0.3s;
        }
        .link-back:hover { color: var(--primary); }

    </style>
</head>
<body>

    <div class="ocean-bg">
        <div class="blob" style="top: -10%; left: -5%;"></div>
        <div class="blob" style="bottom: -10%; right: -5%; background: radial-gradient(circle, rgba(0, 156, 224, 0.07) 0%, transparent 70%);"></div>
    </div>

    <div class="prof-container">
        <main class="prof-card">
            <span class="status-badge">Docente</span>
            
            <header class="header-section">
                <div class="icon-box">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2>Acesso Mestre</h2>
                <p class="subtitle">ELIM MANAGEMENT SYSTEM</p>
            </header>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="E-mail Institucional" required autocomplete="email">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Senha de Acesso" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-glow" id="btnSubmit">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div style="text-align: center;">
                <a href="/" class="link-back">
                    <i class="fas fa-arrow-left"></i> Voltar ao Portal Principal
                </a>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const originalContent = btn.innerHTML;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Inicia estado de carregamento
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Validando...</span>';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // Se o servidor retornar 500, tratamos aqui para não quebrar o JS
                if (response.status === 500) {
                    throw new Error('Instabilidade no servidor (Erro 500). Tente novamente em breve.');
                }

                const result = await response.json().catch(() => {
                    throw new Error('Ocorreu um erro ao processar os dados do servidor.');
                });

                if (response.ok && result.success) {
                    // Verificação de cargos permitidos
                    const allowedRoles = ['docente', 'admin', 'professor'];
                    const userRole = result.role ? result.role.toLowerCase() : '';

                    if (!allowedRoles.includes(userRole)) {
                        throw new Error('Acesso negado: Perfil não autorizado para esta área.');
                    }

                    Swal.fire({
                        icon: 'success',
                        title: 'Acesso Autorizado',
                        text: 'Redirecionando para o painel mestre...',
                        background: '#162a44',
                        color: '#fff',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = result.redirect || '/dashboard';
                    });

                } else {
                    throw new Error(result.error || 'Credenciais inválidas. Verifique seus dados.');
                }

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Falha no Acesso',
                    text: err.message,
                    background: '#162a44',
                    color: '#fff',
                    confirmButtonColor: '#009ce0'
                });
                
                // Restaura o botão para permitir nova tentativa
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>

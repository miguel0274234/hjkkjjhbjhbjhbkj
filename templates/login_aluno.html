<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Ocean | Premium Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-deep: #020b16;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg-deep);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Efeito de Luzes no Fundo */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: move 15s infinite alternate;
        }

        body::before { background: rgba(0, 242, 254, 0.15); top: 10%; left: 10%; }
        body::after { background: rgba(79, 172, 254, 0.15); bottom: 10%; right: 10%; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px); }
        }

        /* Container Principal */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .header { margin-bottom: 40px; text-align: center; }
        
        .header .icon-box {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        .header h1 { font-size: 2rem; letter-spacing: -1px; margin-bottom: 8px; }
        .header p { color: var(--text-dim); font-size: 0.95rem; }

        /* Inputs Modernos */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            padding: 15px 15px 15px 45px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: 0.3s;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .input-box input:focus + i { color: var(--primary); }

        /* Botão de Ação */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #020b16;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
            letter-spacing: 1px;
        }

        .forgot {
            display: block;
            text-align: right;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot:hover { color: var(--primary); }

        /* Área do Professor (Separada e Elegante) */
        .teacher-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .btn-teacher {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .btn-teacher:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-dim);
            transform: scale(1.05);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-card { padding: 40px 25px; }
            .header h1 { font-size: 1.6rem; }
        }
        .teste{
            color: white;
        }
    </style>
</head>
<body>

    <main class="login-card">
        <header class="header">
            <div class="icon-box">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 class="teste">Projeto Vteste</h1>
            <p>Conecte-se com elegância</p>
        </header>

        <form autocomplete="off">
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="E-mail" required>
            </div>

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Senha" required>
            </div>

            <a href="#" class="forgot">Esqueceu o acesso?</a>

            <button type="submit" class="btn-submit">ACESSAR CONTA</button>
        </form>

        <div class="teacher-section">
            <a href="#" class="btn-teacher">
                <i class="fas fa-user-tie"></i>
                Acesso para Professores
            </a>
        </div>
    </main>

</body>
</html>

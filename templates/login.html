<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra | Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #f97316; --bg: #030303; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #030303 80%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .orange-glow:focus { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.3); border-color: var(--primary); }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:active { transform: scale(0.95); }
        .progress-ring { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        select option { background-color: #1a1a1a; color: white; }
        
        .timer-active { animation: pulse-timer 1s infinite; }
        @keyframes pulse-timer {
            0% { transform: scale(1); color: white; }
            50% { transform: scale(1.05); color: #f97316; }
            100% { transform: scale(1); color: white; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <header class="flex justify-center items-center mb-10 pt-8 animate__animated animate__fadeInDown">
            <div class="text-center">
                <h1 class="text-4xl logo-font font-bold text-white tracking-tighter italic">IRON<span class="text-orange-500">TRACK</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.5em] font-bold">Limitless Performance</p>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl animate__animated animate__fadeInLeft">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Concluídos</p>
                <p class="text-xl font-bold italic text-orange-500" id="weeklyStats">0/0 Treinos</p>
            </div>
            <div class="glass p-4 rounded-3xl flex items-center justify-between animate__animated animate__fadeInRight">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Meta Global</p>
                    <p class="text-xl font-bold italic text-white" id="todayProgress">0%</p>
                </div>
                <div class="relative w-10 h-10">
                    <svg class="w-full h-full progress-ring">
                        <circle cx="20" cy="20" r="18" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent"/>
                        <circle id="progressCircle" cx="20" cy="20" r="18" stroke="#f97316" stroke-width="4" fill="transparent" stroke-dasharray="113.1" stroke-dashoffset="113.1" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>

        <div id="restTimerDisplay" class="glass mb-8 p-5 rounded-3xl hidden border-orange-500/50 animate__animated animate__jackInTheBox">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-orange-500 rounded-full animate-ping"></div>
                    <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Descanso Ativo</span>
                </div>
                <span id="timerClock" class="text-3xl font-black text-white italic">00:00</span>
                <button onclick="stopTimer()" class="bg-red-500/10 text-red-500 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>

        <section class="glass p-6 rounded-[2.5rem] mb-10 animate__animated animate__fadeInUp">
            <h2 class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-widest">Agendar Novo Treino</h2>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <select id="daySelect" class="bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow text-sm font-semibold cursor-pointer">
                        <option value="SEG">Seg</option><option value="TER">Ter</option>
                        <option value="QUA">Qua</option><option value="QUI">Qui</option>
                        <option value="SEX">Sex</option><option value="SAB">Sáb</option>
                        <option value="DOM">Dom</option>
                    </select>
                    <input type="text" id="workoutInput" placeholder="Ex: Peito e Tríceps" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow font-medium text-white">
                </div>
                <button onclick="addWorkout()" class="btn-primary w-full text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest shadow-lg shadow-orange-950/20">
                    Criar Treino
                </button>
            </div>
        </section>

        <div id="workoutList" class="space-y-4 pb-10"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-2xl" onclick="closeModal()"></div>
        <div class="glass w-full max-w-sm rounded-[3rem] p-8 relative z-10 border-white/10 animate__animated animate__zoomIn">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modalTitle" class="text-3xl font-bold text-white italic logo-font uppercase leading-none">TREINO</h3>
                    <p id="modalDay" class="text-[10px] text-orange-500 font-black uppercase tracking-widest mt-1"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white transition-colors text-3xl">&times;</button>
            </div>

            <div class="flex gap-2 mb-8">
                <input type="text" id="exerciseInput" placeholder="Ex: Supino Reto" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow text-sm text-white">
                <button onclick="addExercise()" class="bg-orange-500 text-black px-5 rounded-2xl font-black text-xl hover:scale-105 transition-transform">+</button>
            </div>

            <div id="exerciseList" class="max-h-[35vh] overflow-y-auto space-y-3 pr-2"></div>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-tighter">Descanso Rápido</p>
                <div class="flex justify-center gap-3">
                    <button onclick="startTimer(30)" class="w-12 h-12 rounded-full border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black hover:border-orange-500 transition-all">30s</button>
                    <button onclick="startTimer(60)" class="w-12 h-12 rounded-full border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black hover:border-orange-500 transition-all">60s</button>
                    <button onclick="startTimer(90)" class="w-12 h-12 rounded-full border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black hover:border-orange-500 transition-all">90s</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let workouts = JSON.parse(localStorage.getItem('ironTrackUltra_v3')) || [];
        let activeWorkoutId = null;
        let timerInterval;

        // Efeitos Sonoros Simples (Beep)
        const playBeep = () => {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(context.currentTime + 0.1);
        };

        function save() {
            localStorage.setItem('ironTrackUltra_v3', JSON.stringify(workouts));
            render();
            updateStats();
        }

        function addWorkout() {
            const day = document.getElementById('daySelect').value;
            const title = document.getElementById('workoutInput').value;
            if (!title) return;

            workouts.push({ 
                id: Date.now(), 
                day, 
                title, 
                done: false, 
                exercises: [] 
            });
            
            save();
            document.getElementById('workoutInput').value = "";
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.9 }, colors: ['#f97316', '#ffffff'] });
        }

        function toggleWorkoutStatus(id, e) {
            e.stopPropagation();
            workouts = workouts.map(w => {
                if(w.id === id) {
                    if(!w.done) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    return {...w, done: !w.done};
                }
                return w;
            });
            save();
        }

        function openModal(id) {
            activeWorkoutId = id;
            const workout = workouts.find(w => w.id === id);
            document.getElementById('modalTitle').innerText = workout.title;
            document.getElementById('modalDay').innerText = `CRONOGRAMA: ${workout.day}`;
            document.getElementById('modal').classList.remove('hidden');
            renderExercises();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            activeWorkoutId = null;
        }

        function addExercise() {
            const input = document.getElementById('exerciseInput');
            if (!input.value) return;
            
            workouts = workouts.map(w => {
                if(w.id === activeWorkoutId) {
                    w.exercises.push({ 
                        id: Date.now(), 
                        name: input.value, 
                        completed: false,
                        weight: '' 
                    });
                }
                return w;
            });
            input.value = "";
            save();
            renderExercises();
        }

        function toggleExercise(exId) {
            workouts = workouts.map(w => {
                if(w.id === activeWorkoutId) {
                    w.exercises = w.exercises.map(ex => {
                        if(ex.id === exId) {
                            const newStatus = !ex.completed;
                            let weight = ex.weight;
                            if(newStatus) {
                                weight = prompt(`Carga para este exercício (kg)?`, ex.weight || "") || ex.weight;
                            }
                            return { ...ex, completed: newStatus, weight: weight };
                        }
                        return ex;
                    });
                }
                return w;
            });
            save();
            renderExercises();
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            const display = document.getElementById('restTimerDisplay');
            const clock = document.getElementById('timerClock');
            display.classList.remove('hidden');
            
            let timeLeft = seconds;
            
            const updateUI = () => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                clock.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if(timeLeft <= 5) clock.classList.add('timer-active');
            };

            updateUI();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playBeep();
                    clock.classList.remove('timer-active');
                    alert("DESCANSO FINALIZADO! VOLTE AO TREINO.");
                    display.classList.add('hidden');
                }
            }, 1000);
            closeModal(); // Fecha o modal para focar no timer
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('restTimerDisplay').classList.add('hidden');
            document.getElementById('timerClock').classList.remove('timer-active');
        }

        function updateStats() {
            const total = workouts.length;
            const done = workouts.filter(w => w.done).length;
            document.getElementById('weeklyStats').innerText = `${done}/${total} Treinos`;
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('todayProgress').innerText = `${pct}%`;
            document.getElementById('progressCircle').style.strokeDashoffset = 113.1 - (pct / 100 * 113.1);
        }

        function renderExercises() {
            const container = document.getElementById('exerciseList');
            const workout = workouts.find(w => w.id === activeWorkoutId);
            if(!workout) return;

            container.innerHTML = workout.exercises.map(ex => `
                <div onclick="toggleExercise(${ex.id})" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-all border border-white/5 animate__animated animate__fadeIn">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold ${ex.completed ? 'opacity-30 line-through' : 'text-white'}">${ex.name}</span>
                        ${ex.weight ? `<span class="text-[10px] text-orange-500 font-bold uppercase mt-1">Carga: ${ex.weight} kg</span>` : ''}
                    </div>
                    <div class="w-7 h-7 rounded-xl border-2 border-orange-500 flex items-center justify-center transition-all ${ex.completed ? 'bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.4)]' : ''}">
                        ${ex.completed ? '<svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function render() {
            const list = document.getElementById('workoutList');
            if (workouts.length === 0) {
                list.innerHTML = `<div class="text-center py-20 opacity-20 font-bold uppercase tracking-widest animate__animated animate__pulse animate__infinite">Foco no Objetivo</div>`;
                return;
            }
            list.innerHTML = workouts.slice().reverse().map(w => `
                <div onclick="openModal(${w.id})" class="glass rounded-[2rem] p-5 flex items-center justify-between cursor-pointer border-l-4 transition-all hover:translate-x-1 ${w.done ? 'border-green-500 opacity-50' : 'border-orange-500 animate__animated animate__fadeInLeft'}">
                    <div class="flex-1">
                        <span class="text-[9px] font-black px-2 py-1 rounded-md bg-white/10 text-orange-500 uppercase tracking-tighter">${w.day}</span>
                        <h3 class="text-xl font-bold italic uppercase tracking-tighter mt-2 text-white">${w.title}</h3>
                        <div class="flex gap-3 mt-1">
                            <p class="text-[9px] text-gray-400 font-bold uppercase leading-none">${w.exercises.length} Movimentos</p>
                            <p class="text-[9px] text-orange-500 font-bold uppercase leading-none">${w.exercises.filter(e => e.completed).length} Concluídos</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleWorkoutStatus(${w.id}, event)" class="h-12 w-12 rounded-2xl flex items-center justify-center transition-all ${w.done ? 'bg-green-500 text-black' : 'bg-white/5 text-gray-500 border border-white/10'}">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button onclick="deleteWorkout(${w.id}, event)" class="h-12 w-12 rounded-2xl bg-white/5 text-gray-700 flex items-center justify-center hover:bg-red-500/20 hover:text-red-500 transition-all">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteWorkout(id, e) {
            e.stopPropagation();
            if(confirm("Eliminar este registro de treino?")) {
                workouts = workouts.filter(w => w.id !== id);
                save();
            }
        }

        // Inicialização
        updateStats();
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente | Deep Ocean Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #00f5d4;
            --secondary: #00b4d8;
            --accent: #72efdd;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --input-bg: rgba(0, 0, 0, 0.3);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fundo Dinâmico (Efeito Abissal) */
        .ocean-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) rotate(0deg); }
            to { transform: translate(30%, 20%) rotate(360deg); }
        }

        /* Glass Card */
        .prof-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            perspective: 1000px;
        }

        .prof-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: transform 0.3s ease;
        }

        /* Badge de Status */
        .status-badge {
            position: absolute;
            top: 25px; right: 30px;
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Icone e Header */
        .header-section { text-align: center; margin-bottom: 40px; }
        
        .icon-box {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            color: #020617;
            box-shadow: 0 10px 20px rgba(0, 245, 212, 0.2);
        }

        h2 { font-weight: 800; font-size: 1.75rem; letter-spacing: -0.5px; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; }

        /* Estilização dos Inputs */
        .input-group { margin-bottom: 24px; position: relative; }

        .input-group i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(0, 245, 212, 0.03);
            box-shadow: 0 0 0 4px rgba(0, 245, 212, 0.1);
        }

        .input-group input:focus + i { color: var(--primary); }

        /* Botão de Autenticação */
        .btn-glow {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #020617;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 245, 212, 0.3);
            filter: brightness(1.1);
        }

        .btn-glow:active { transform: translateY(0); }

        /* Links e Rodapé */
        .footer-links {
            margin-top: 35px;
            text-align: center;
        }

        .link-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .link-back:hover { color: var(--primary); }

        /* Mobile */
        @media (max-width: 480px) {
            .prof-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <div class="ocean-bg">
        <div class="blob" style="top: -10%; left: -5%;"></div>
        <div class="blob" style="bottom: -5%; right: -5%; animation-delay: -7s; background: radial-gradient(circle, rgba(0, 180, 216, 0.05) 0%, transparent 70%);"></div>
    </div>

    <div class="prof-container">
        <main class="prof-card">
            <span class="status-badge">Docência</span>
            
            <header class="header-section">
                <div class="icon-box">
                    <i class="fas fa-compass"></i>
                </div>
                <h2>Acesso Mestre</h2>
                <p class="subtitle">Deep Ocean Intelligence System</p>
            </header>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user-tie"></i>
                    <input type="email" id="email" placeholder="E-mail Institucional" required autocomplete="email">
                </div>

                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="Chave de Acesso" required>
                </div>

                <button type="submit" class="btn-glow" id="btnSubmit">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </form>

            <div class="footer-links">
                <a href="/login" class="link-back">
                    <i class="fas fa-arrow-left-long"></i> Portal do Estudante
                </a>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnSubmit');
            const originalContent = btn.innerHTML;

            // Feedback de Processamento
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Autenticando...';
            btn.style.filter = 'grayscale(0.5)';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    if (result.role === 'aluno') {
                        throw new Error('Nível de acesso insuficiente para este portal.');
                    }

                    Swal.fire({
                        icon: 'success',
                        title: 'Bem-vindo, Mestre',
                        text: 'Sincronização abissal concluída.',
                        background: '#0f172a',
                        color: '#fff',
                        showConfirmButton: false,
                        timer: 1800,
                        backdrop: `rgba(2, 6, 23, 0.8)`
                    }).then(() => {
                        window.location.href = result.redirect;
                    });
                } else {
                    throw new Error(result.error || 'Falha na verificação das credenciais.');
                }

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de Protocolo',
                    text: err.message,
                    background: '#0f172a',
                    color: '#fff',
                    confirmButtonColor: '#00f5d4'
                });
                
                // Resetar botão
                btn.disabled = false;
                btn.innerHTML = originalContent;
                btn.style.filter = 'none';
            }
        });
    </script>
</body>
</html>

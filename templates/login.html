<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente | Elim Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #d4e117;       /* Amarelo Limão */
            --secondary: #009ce0;     /* Azul Ciano */
            --accent: #005da3;        /* Azul Médio */
            --bg-deep: #0d1a2b;       /* Fundo Profundo */
            --card-bg: rgba(22, 42, 68, 0.6);
            --text-main: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fundo Animado */
        .ocean-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top right, #162a44, #0d1a2b);
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212, 225, 23, 0.05) 0%, transparent 70%);
            filter: blur(60px);
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 10%); }
        }

        .prof-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 20px; right: 25px;
            background: rgba(212, 225, 23, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-section { text-align: center; margin-bottom: 35px; }
        
        .icon-box {
            width: 65px; height: 65px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 15px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            color: var(--bg-deep);
        }

        h2 { font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { color: var(--secondary); font-size: 0.85rem; font-weight: 600; opacity: 0.9; }

        .input-group { margin-bottom: 20px; position: relative; }

        .input-group i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(212, 225, 23, 0.1);
        }

        .btn-glow {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glow:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 156, 224, 0.3);
        }

        .btn-glow:disabled { opacity: 0.6; cursor: not-allowed; }

        .link-back {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            transition: 0.3s;
        }
        .link-back:hover { color: var(--primary); }

        .fa-spin { margin-right: 8px; }
    </style>
</head>
<body>

    <div class="ocean-bg">
        <div class="blob" style="top: 0%; left: 0%;"></div>
        <div class="blob" style="bottom: 0%; right: 0%; background: radial-gradient(circle, rgba(0, 156, 224, 0.05) 0%, transparent 70%);"></div>
    </div>

    <div class="prof-card">
        <span class="status-badge">Docente</span>
        
        <header class="header-section">
            <div class="icon-box">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Acesso Mestre</h2>
            <p class="subtitle">ELIM MANAGEMENT SYSTEM</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail Institucional" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Senha de Acesso" required>
            </div>

            <button type="submit" class="btn-glow" id="btnSubmit">
                <span>Entrar no Sistema</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="text-align: center;">
            <a href="/" class="link-back">
                <i class="fas fa-arrow-left"></i> Voltar ao Portal
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Feedback de carregamento
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Autenticando...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Acesso Autorizado',
                        text: 'Preparando seu ambiente docente...',
                        background: '#0d1a2b',
                        color: '#fff',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = result.redirect;
                    });
                } else {
                    throw new Error(result.error || 'Falha na autenticação.');
                }

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de Acesso',
                    text: err.message,
                    background: '#0d1a2b',
                    color: '#fff',
                    confirmButtonColor: '#009ce0'
                });
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre |</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-prof: #00f5d4;
            --secondary-prof: #00b4d8;
            --bg-deep: #010810;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(0, 245, 212, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar Especial Professor */
        nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(1, 8, 16, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-prof {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-prof);
            display: flex;
            align-items: center; gap: 10px;
        }

        /* Layout Grid */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Seções de Vidro */
        .glass-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h2 { font-size: 1.5rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        h2 i { color: var(--primary-prof); }

        /* Formulário de Postagem */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.9rem; }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus { border-color: var(--primary-prof); box-shadow: 0 0 10px rgba(0, 245, 212, 0.1); }

        .btn-publish {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary-prof), var(--secondary-prof));
            border: none;
            border-radius: 12px;
            color: #010810;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 245, 212, 0.2); }

        /* Lista de Alunos Lateral */
        .student-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .student-avatar {
            width: 40px; height: 40px;
            background: var(--primary-prof);
            color: #010810;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        /* Modal / Feedback sutil */
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--primary-prof); color: #000;
            padding: 15px 25px; border-radius: 10px; font-weight: bold;
            display: none; z-index: 2000;
        }

        @media (max-width: 1000px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-prof">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Docente</span>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span style="opacity: 0.7;">{{ user.unidade.nome_igreja }}</span>
            <a href="/api/auth/logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">Sair</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <main class="glass-section">
            <h2><i class="fas fa-pen-nib"></i> Publicar Novo Estudo</h2>
            <form id="studyForm">
                <div class="form-group">
                    <label>Título do Estudo</label>
                    <input type="text" id="title" placeholder="Ex: O Caminho da Fé" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="category">
                        <option value="Geral">Geral</option>
                        <option value="Teologia">Teologia</option>
                        <option value="História">História</option>
                        <option value="Vida Cristã">Vida Cristã</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Conteúdo Completo</label>
                    <textarea id="content" rows="10" placeholder="Escreva o conteúdo aqui..." required></textarea>
                </div>
                <button type="submit" class="btn-publish">PUBLICAR PARA A UNIDADE</button>
            </form>
        </main>

        <aside class="glass-section">
            <h2><i class="fas fa-users"></i> Alunos da Unidade</h2>
            
            <div style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);">
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px;">Matricular novo aluno:</p>
                <input type="text" id="newStudentName" placeholder="Nome" style="width: 100%; margin-bottom: 5px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff;">
                <input type="email" id="newStudentEmail" placeholder="E-mail" style="width: 100%; margin-bottom: 10px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff;">
                <button onclick="cadastrarAluno()" style="width: 100%; padding: 8px; background: transparent; border: 1px solid var(--primary-prof); color: var(--primary-prof); cursor: pointer; border-radius: 8px;">+ Adicionar</button>
            </div>

            <ul class="student-list" id="alunoLista">
                </ul>
        </aside>

    </div>

    <div id="toast" class="toast">Ação realizada com sucesso!</div>

    <script>
        // 1. PUBLICAR ESTUDO
        document.getElementById('studyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                content: document.getElementById('content').value
            };

            const response = await fetch('/api/studies/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                showToast("Estudo publicado com sucesso!");
                document.getElementById('studyForm').reset();
            }
        });

        // 2. MATRICULAR ALUNO
        async function cadastrarAluno() {
            const name = document.getElementById('newStudentName').value;
            const email = document.getElementById('newStudentEmail').value;
            const password = "mudar123"; // Senha padrão para novos alunos

            const response = await fetch('/api/professor/cadastrar-aluno', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if(response.ok) {
                showToast("Aluno cadastrado!");
                carregarAlunos();
            }
        }

        // 3. CARREGAR LISTA DE ALUNOS (Simulação para demonstração)
        // No seu back-end, você pode criar uma rota GET /api/professor/alunos
        async function carregarAlunos() {
            // Aqui você faria um fetch na lista de alunos da unidade
            const lista = document.getElementById('alunoLista');
            lista.innerHTML = '<li class="student-item">Carregando alunos...</li>';
            
            // Exemplo visual:
            setTimeout(() => {
                lista.innerHTML = `
                    <li class="student-item">
                        <div class="student-avatar">JD</div>
                        <div><p>João Diniz</p><small style="color:var(--text-dim)">joao@email.com</small></div>
                    </li>
                `;
            }, 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        carregarAlunos();
    </script>
</body>
</html>
